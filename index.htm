<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Tir Mobile</title>
    <style>
        :root {
            --primary: #ff4757;
            --secondary: #2f3542;
            --accent: #1e90ff;
            --text: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #000;
            color: var(--text);
            user-select: none;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Екрани */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            background: rgba(0,0,0,0.85);
            transition: opacity 0.3s ease;
        }

        .hidden {
            display: none !important;
            opacity: 0;
        }

        /* Меню та Статистика */
        .stats-bar {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 20px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px border rgba(255,255,255,0.2);
        }

        h1 { margin: 0 0 20px 0; font-size: 2rem; text-transform: uppercase; letter-spacing: 2px; }

        /* Вибір персонажа */
        .char-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 90%;
            max-width: 400px;
        }

        .char-card {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid transparent;
            border-radius: 15px;
            padding: 10px;
            text-align: center;
            transition: all 0.2s;
            cursor: pointer;
        }

        .char-card:active { transform: scale(0.95); background: var(--accent); }
        .char-card img { width: 80px; height: 80px; object-fit: contain; margin-bottom: 5px; border-radius: 10px; }

        /* Кнопки */
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
        }

        .btn-reset { background: #57606f; font-size: 0.8rem; padding: 8px 20px; margin-top: 10px; }

        /* Ігрове поле */
        #game-canvas {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            display: block;
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            pointer-events: none;
            display: flex;
            justify-content: space-around;
            z-index: 5;
        }

        .score-box {
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-layer" class="hidden">
        <div class="score-box">Рахунок: <span id="current-score">0</span></div>
        <div class="score-box">Рекорд: <span id="best-score">0</span></div>
    </div>

    <canvas id="game-canvas"></canvas>

    <div id="start-screen" class="screen">
        <h1>Обери гравця</h1>
        <div class="stats-bar">
            <div>Твій Рекорд: <span id="stat-record">0</span></div>
            <div>Поразок: <span id="stat-losses">0</span></div>
            <button class="btn btn-reset" onclick="resetStats()">Скинути дані</button>
        </div>
        <div class="char-grid">
            <div class="char-card" onclick="startGame('Tito.png')">
                <img src="Tito.png" alt="Tito">
                <div>Тіто</div>
            </div>
            <div class="char-card" onclick="startGame('Smartik.png')">
                <img src="Smartik.png" alt="Smartik">
                <div>Смартик</div>
            </div>
            <div class="char-card" onclick="startGame('Junior.png')">
                <img src="Junior.png" alt="Junior">
                <div>Джуніор</div>
            </div>
            <div class="char-card" onclick="startGame('Fil.png')">
                <img src="Fil.png" alt="Fil">
                <div>Філ</div>
            </div>
            <div class="char-card" onclick="startGame('Milka.png')">
                <img src="Milka.png" alt="Milka">
                <div>Мілка</div>
            </div>
            <div class="char-card" onclick="startGame('Bark.png')">
                <img src="Bark.png" alt="Bark">
                <div>Барк</div>
            </div>
        </div>
    </div>

    <div id="game-over-screen" class="screen hidden">
        <h1 style="color: var(--primary);">ПРОГРАШ!</h1>
        <div class="stats-bar">
            <div id="final-score" style="font-size: 1.2rem; margin-bottom: 10px;">Рахунок: 0</div>
            <div id="new-record-msg" style="color: #f1c40f; font-weight: bold;" class="hidden">НОВИЙ РЕКОРД!</div>
        </div>
        <button class="btn" onclick="showMenu()">В меню</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    const startScreen = document.getElementById('start-screen');
    const gameOverScreen = document.getElementById('game-over-screen');
    const uiLayer = document.getElementById('ui-layer');

    let score = 0;
    let gameActive = false;
    let target = null;
    let speed = 2;
    let animationId;
    let selectedCharImg = '';

    // Локальне сховище
    let record = localStorage.getItem('tito_game_record') || 0;
    let losses = localStorage.getItem('tito_game_losses') || 0;

    function updateStatsDisplay() {
        document.getElementById('stat-record').innerText = record;
        document.getElementById('stat-losses').innerText = losses;
        document.getElementById('best-score').innerText = record;
    }

    function resetStats() {
        if(confirm('Ви впевнені, що хочете видалити всі досягнення?')) {
            localStorage.setItem('tito_game_record', 0);
            localStorage.setItem('tito_game_losses', 0);
            record = 0;
            losses = 0;
            updateStatsDisplay();
        }
    }

    // Налаштування розміру канвасу
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // Клас Фігури (50+ варіацій через рандомізацію параметрів)
    class Target {
        constructor() {
            this.size = 60 + Math.random() * 40;
            this.x = -this.size;
            this.y = 150 + Math.random() * (canvas.height - 300);
            this.type = Math.floor(Math.random() * 6); // 0-5 типів базових форм
            this.color = `hsl(${Math.random() * 360}, 70%, 60%)`;
            this.direction = 1;
            this.angle = 0;
            this.rotationSpeed = (Math.random() - 0.5) * 0.1;
            this.speed = speed;
            this.points = Math.floor(Math.random() * 50) + 1; // "50 видів" реалізуємо через комбінацію форми, кольору та параметрів
        }

        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.angle);
            ctx.fillStyle = this.color;
            ctx.shadowBlur = 15;
            ctx.shadowColor = this.color;
            
            ctx.beginPath();
            switch(this.type) {
                case 0: ctx.arc(0, 0, this.size/2, 0, Math.PI * 2); break; // Коло
                case 1: ctx.rect(-this.size/2, -this.size/2, this.size, this.size); break; // Квадрат
                case 2: // Трикутник
                    ctx.moveTo(0, -this.size/2);
                    ctx.lineTo(this.size/2, this.size/2);
                    ctx.lineTo(-this.size/2, this.size/2);
                    break;
                case 3: // Ромб
                    ctx.moveTo(0, -this.size/2);
                    ctx.lineTo(this.size/2, 0);
                    ctx.lineTo(0, this.size/2);
                    ctx.lineTo(-this.size/2, 0);
                    break;
                case 4: // П'ятикутник
                    for(let i=0; i<5; i++) {
                        let a = (Math.PI*2/5) * i - Math.PI/2;
                        ctx.lineTo(Math.cos(a)*this.size/2, Math.sin(a)*this.size/2);
                    }
                    break;
                case 5: // Зірка
                    for(let i=0; i<10; i++) {
                        let a = (Math.PI*2/10) * i - Math.PI/2;
                        let r = (i%2 === 0) ? this.size/2 : this.size/4;
                        ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
                    }
                    break;
            }
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        }

        update() {
            this.x += this.speed * this.direction;
            this.angle += this.rotationSpeed;

            if (this.x > canvas.width + this.size || this.x < -this.size) {
                this.direction *= -1;
            }
        }

        isHit(tx, ty) {
            const dist = Math.sqrt((tx - this.x)**2 + (ty - this.y)**2);
            return dist < this.size/2 + 20; // +20 для легшого натискання на мобілках
        }
    }

    function startGame(imgSrc) {
        selectedCharImg = imgSrc;
        canvas.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('${imgSrc}')`;
        
        score = 0;
        speed = 4;
        gameActive = true;
        
        startScreen.classList.add('hidden');
        gameOverScreen.classList.add('hidden');
        uiLayer.classList.remove('hidden');
        
        document.getElementById('current-score').innerText = score;
        spawnTarget();
        animate();
    }

    function spawnTarget() {
        target = new Target();
    }

    function animate() {
        if (!gameActive) return;
        
        // Малюємо фон
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        target.update();
        target.draw();
        
        animationId = requestAnimationFrame(animate);
    }

    function handleInput(e) {
        if (!gameActive) return;

        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        
        const tx = clientX - rect.left;
        const ty = clientY - rect.top;

        if (target.isHit(tx, ty)) {
            score++;
            speed += 0.3; // Плавне збільшення швидкості
            document.getElementById('current-score').innerText = score;
            spawnTarget();
        } else {
            gameOver();
        }
    }

    function gameOver() {
        gameActive = false;
        cancelAnimationFrame(animationId);
        
        losses++;
        localStorage.setItem('tito_game_losses', losses);
        
        let isNewRecord = false;
        if (score > record) {
            record = score;
            localStorage.setItem('tito_game_record', record);
            isNewRecord = true;
        }

        document.getElementById('final-score').innerText = "Твій результат: " + score;
        document.getElementById('new-record-msg').className = isNewRecord ? "" : "hidden";
        
        uiLayer.classList.add('hidden');
        gameOverScreen.classList.remove('hidden');
        updateStatsDisplay();
    }

    function showMenu() {
        gameOverScreen.classList.add('hidden');
        startScreen.classList.remove('hidden');
        updateStatsDisplay();
    }

    // Слухачі подій
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        handleInput(e);
    }, {passive: false});

    canvas.addEventListener('mousedown', handleInput);

    // Ініціалізація статистики
    updateStatsDisplay();

</script>

</body>
</html>
